services:
  app:
    build: .
    env_file: .env
    environment:
      PHX_SERVER: "true"
      DATABASE_URL: "ecto://uw_billing:${POSTGRES_PASSWORD}@shared-postgres/${POSTGRES_DB}"
      CLICKHOUSE_HOST: "clickhouse"
    ports:
      - "${APP_PORT:-4200}:4200"
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - shared_pg

  clickhouse:
    image: clickhouse/clickhouse-server:24
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./priv/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  clickhouse_data:

networks:
  shared_pg:
    external: true
